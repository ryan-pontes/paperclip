name: Docker

on:
  # Build only on release tags or manual dispatch — not on every master push.
  # Master sees ~10 commits/day from the squad; rebuilding the multi-stage
  # image each time burns GHA minutes (and ran into the spending-limit block)
  # without giving us anything we use. We rebuild explicitly when we want to
  # cut over a new image to production: tag `vYYYY.MM.DD.N` (or trigger via
  # `gh workflow run docker.yml`) and the run publishes `ghcr.io/.../paperclip:<sha>`
  # + `:latest`.
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, ARM64]
    timeout-minutes: 180
    # CD build: never cancel an in-flight master build. With frequent master
    # pushes and a slow multi-arch build, cancel-in-progress dropped every run
    # mid-build (NODE-234), so no image was ever published. Queue instead:
    # each master commit gets built/pushed; the last to finish wins :latest.
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
